<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SARAIN - Cart & Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f9f9f9; color: #111; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 50px; border-bottom: 1px solid #eee; background: #fff; }
        .logo { font-size: 28px; font-weight: 900; letter-spacing: 3px; color: #111; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; list-style: none; }
        .nav-links a { text-decoration: none; color: #111; font-size: 15px; font-weight: 500; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 30px; }
        h2 { font-size: 28px; margin-bottom: 30px; }
        .cart-item { display: flex; gap: 20px; background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 15px; align-items: center; }
        .cart-item img { width: 100px; height: 120px; object-fit: cover; border-radius: 8px; }
        .cart-item-info { flex: 1; }
        .cart-item-info h3 { font-size: 16px; }
        .cart-item-info p { color: #666; font-size: 14px; }
        .qty-btn { padding: 5px 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; border-radius: 4px; }
        .remove-btn { color: #e00; background: none; border: none; cursor: pointer; font-size: 13px; margin-left: 15px; }
        .summary { background: #fff; padding: 30px; border-radius: 12px; margin-top: 30px; }
        .summary h3 { margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 8px 0; }
        .summary-total { font-size: 22px; font-weight: 700; border-top: 1px solid #eee; padding-top: 15px; margin-top: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .btn { padding: 16px 40px; background: #111; color: #fff; border: none; border-radius: 30px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { background: #333; }
        .empty { text-align: center; color: #999; padding: 80px 20px; }
        .empty a { color: #111; font-weight: 600; }
        .message { padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        footer { text-align: center; padding: 30px; color: #666; margin-top: 60px; }
        @media (max-width: 768px) { .container { padding: 20px; } .cart-item { flex-direction: column; } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">SARAIN</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/men">Men</a></li>
            <li><a href="/women">Women</a></li>
            <li><a href="/kids">Kids</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>🛒 Shopping Cart</h2>
        <div id="cart-items"></div>
        <div class="summary" id="checkout-form" style="display:none;">
            <h3>📦 Delivery Details</h3>
            <div class="form-group"><label>Full Name</label><input type="text" id="cust-name" placeholder="Your full name"></div>
            <div class="form-group"><label>Phone Number</label><input type="text" id="cust-phone" placeholder="98XXXXXXXX"></div>
            <div class="form-group"><label>Delivery Address</label><textarea id="cust-address" rows="2" placeholder="Street, City, Area"></textarea></div>
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">Rs. 0</span></div>
            <div class="summary-row"><span>Delivery</span><span>Rs. 100</span></div>
            <div class="summary-row summary-total"><span>Total</span><span id="total">Rs. 0</span></div>
            <button class="btn" onclick="placeOrder()" style="margin-top:15px;">✅ Place Order</button>
            <div id="message" class="message"></div>
        </div>
    </div>
    <footer>© 2024 SARAIN. All rights reserved.</footer>

    <script>
        let cart = JSON.parse(localStorage.getItem('sarain-cart') || '[]');

        function renderCart() {
            const c = document.getElementById('cart-items');
            if (cart.length === 0) {
                c.innerHTML = '<p class="empty">Your cart is empty.<br><br><a href="/">← Continue Shopping</a></p>';
                document.getElementById('checkout-form').style.display = 'none';
                return;
            }
            document.getElementById('checkout-form').style.display = 'block';
            c.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <img src="${item.image || 'https://placehold.co/100x120/f0f0f0/999'}" alt="${item.name}">
                    <div class="cart-item-info"><h3>${item.name}</h3><p>Size: ${item.size||'M'} | Rs. ${item.price}</p></div>
                    <div><button class="qty-btn" onclick="changeQty(${i},-1)">-</button><span style="margin:0 8px;">${item.quantity}</span><button class="qty-btn" onclick="changeQty(${i},1)">+</button></div>
                    <p style="font-weight:700;">Rs. ${item.price * item.quantity}</p>
                    <button class="remove-btn" onclick="removeItem(${i})">Remove</button>
                </div>
            `).join('');
            const sub = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            document.getElementById('subtotal').textContent = 'Rs. ' + sub;
            document.getElementById('total').textContent = 'Rs. ' + (sub + 100);
        }

        function changeQty(i, d) { cart[i].quantity += d; if (cart[i].quantity < 1) cart[i].quantity = 1; saveAndRender(); }
        function removeItem(i) { cart.splice(i, 1); saveAndRender(); }
        function saveAndRender() { localStorage.setItem('sarain-cart', JSON.stringify(cart)); renderCart(); }

        function placeOrder() {
            const n = document.getElementById('cust-name').value, p = document.getElementById('cust-phone').value, a = document.getElementById('cust-address').value;
            const msg = document.getElementById('message');
            if (!n || !p || !a) { msg.textContent = 'Please fill all fields'; msg.className = 'message error'; return; }
            const sub = cart.reduce((s,i) => s + i.price * i.quantity, 0);
            fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({items:cart, total:sub+100, name:n, phone:p, address:a}) })
            .then(r => r.json()).then(d => {
                if (d.success) { msg.textContent='✅ Order #'+d.orderId+' placed! Thank you!'; msg.className='message success'; localStorage.removeItem('sarain-cart'); cart=[]; renderCart(); }
            });
        }

        renderCart();
    </script>
</body>
</html>
